<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Question! ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6e6;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #d63031; margin-bottom: 30px; }
        .btn-container {
            position: relative;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        #yesBtn { background-color: #2ecc71; color: white; }
        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
        }
        .hidden { display: none; }
        .cheers-screen h1 { font-size: 3rem; animation: bounce 1s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <!-- Step 1: The Proposal Screen -->
    <div id="proposalScreen" class="container">
        <h1>Will you go on a date with me? 🌹</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="showCheers()">Yes! ✨</button>
            <button id="noBtn" onmouseover="moveNoButton()">No 😢</button>
        </div>
    </div>

    <!-- Step 2: The Cheers Screen -->
    <div id="cheersScreen" class="container hidden">
        <div class="cheers-screen">
            <h1>Cheers! 🥂🎉</h1>
            <p style="font-size: 1.2rem; color: #555;">It's a date! I'll pick you up. ❤️</p>
        </div>
    </div>

    <script>
        // Teleports the "No" button to a random position within the viewport bounds
        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Calculate random coordinates, keeping the button safely inside the window view
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            // Override original centering flexbox constraints
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Swaps the visibility of the proposal and success screens
        function showCheers() {
            document.getElementById('proposalScreen').classList.add('hidden');
            document.getElementById('cheersScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
