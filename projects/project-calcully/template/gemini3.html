<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handdrawn Calculator Frontend</title>
    <style>
        /* Core resetting and centering */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5; /* Light grey canvas */
        }

        /* Calculator Frame matching your drawn boundaries */
        .calculator-container {
            width: 360px;
            background: #ffffff;
            border: 3px solid #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Brand Name Styling */
        .brand-name {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #555;
            text-transform: uppercase;
            padding-bottom: 2px;
        }

        /* Display Screen mimicking the classic LCD sketch box */
        .calculator-display {
            border: 2px solid #222;
            border-radius: 8px;
            background-color: #e2ebe9; /* Retro LCD digital tint */
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 120px;
        }

        .expression {
            font-size: 1.5rem;
            color: #555;
            text-align: left;
        }

        .result {
            font-size: 2.5rem;
            font-weight: bold;
            color: #111;
            text-align: right;
        }

        /* The Grid system mapping out the layout */
        .calculator-keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        /* Base button styling */
        .btn {
            padding: 15px 5px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 1px solid #b0b0b0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.05s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Color Coding based on button types */
        .num {
            background-color: #ffffff;
            color: #333333;
        }
        .num:hover {
            background-color: #f7f7f7;
        }

        .func {
            background-color: #7f8c8d;
            color: #ffffff;
            font-size: 0.95rem;
        }
        .func:hover {
            background-color: #6c7a7b;
        }

        .op {
            background-color: #3498db;
            color: #ffffff;
        }
        .op:hover {
            background-color: #2980b9;
        }

        /* Clear button distinct warning styling */
        .clear-btn {
            background-color: #e74c3c;
            color: white;
        }
        .clear-btn:hover {
            background-color: #c0392b;
        }

        /* Modifying the plus button layout to leave room for Clear */
        .plus-btn {
            grid-column: span 3;
            padding: 18px;
            font-size: 1.4rem;
        }

        /* --- CUSTOM NAVIGATION PAD CROSS LAYOUT --- */
        .navigation-pad {
            grid-column: span 2;
            grid-row: span 2;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            background: #eaeded;
            border-radius: 50%; /* Gives it an iconic circular D-pad backing footprint */
            padding: 6px;
            align-items: center;
            justify-content: center;
        }

        /* Individual buttons inside your nav-pad layout */
        .navigation-pad button {
            background-color: #5d6d7e;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease;
        }

        .navigation-pad button:hover {
            background-color: #4b5866;
        }

        /* Forcing the cross configuration inside its nested grid */
        .navigation-pad button:nth-child(1) { grid-column: 2; grid-row: 1; } /* Up Arrow */
        .navigation-pad button:nth-child(2) { grid-column: 1; grid-row: 2; } /* Left Arrow */
        .navigation-pad button:nth-child(3) { grid-column: 2; grid-row: 2; background-color: #47525e;} /* Center Dot */
        .navigation-pad button:nth-child(4) { grid-column: 3; grid-row: 2; } /* Right Arrow */
        .navigation-pad button:nth-child(5) { grid-column: 2; grid-row: 3; } /* Down Arrow */

    </style>
</head>
<body>

    <div class="calculator-container">
        <div class="brand-name">MY BRAND</div>

        <div class="calculator-display">
            <div class="expression">2 + 3 + 11</div>
            <div class="result">16</div>
        </div>

        <div class="calculator-keypad">
            <button class="btn func">Shift</button>
            <button class="btn func">m²</button>
            <button class="btn func">sin</button>
            <button class="btn func">on/off</button>

            <button class="btn func">cos</button>
            
            <div class="navigation-pad">
                <button>▲</button>
                <button>◀</button>
                <button>●</button>
                <button>▶</button>
                <button>▼</button>
            </div>
            
            <button class="btn func">tan</button>
            
            <button class="btn func">log</button>
            <button class="btn func">√</button>

            <button class="btn num">7</button>
            <button class="btn num">8</button>
            <button class="btn num">9</button>
            <button class="btn func">( )</button>

            <button class="btn num">4</button>
            <button class="btn num">5</button>
            <button class="btn num">6</button>
            <button class="btn op">÷</button>

            <button class="btn num">1</button>
            <button class="btn num">2</button>
            <button class="btn num">3</button>
            <button class="btn op">×</button>

            <button class="btn num">0</button>
            <button class="btn num">.</button>
            <button class="btn op">=</button>
            <button class="btn op">-</button>

            <button class="btn op plus-btn">+</button>
            <button class="btn clear-btn">C</button>
        </div>
    </div>

</body>
</html>
