```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Question ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff4e50,#fc913a,#ff6b81,#ff8fab);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.screen{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;
}

h1{
    font-size:3rem;
    margin-bottom:20px;
    text-shadow:0 0 20px rgba(0,0,0,.3);
}

p{
    font-size:1.2rem;
    margin-bottom:30px;
}

button{
    border:none;
    padding:15px 35px;
    margin:10px;
    border-radius:50px;
    font-size:1.2rem;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

#yesBtn{
    background:white;
    color:#ff4e50;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    position:absolute;
    background:#222;
    color:white;
}

.hidden{
    display:none;
}

.heart{
    position:absolute;
    font-size:30px;
    animation:floatUp 6s linear infinite;
    pointer-events:none;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:1;
    }
    to{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    animation:fall 4s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-50px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>
</head>
<body>

<div id="questionScreen" class="screen">
    <h1>❤️ Will You Go On A Date With Me? ❤️</h1>
    <p>You only have one sensible option 😌</p>

    <div>
        <button id="yesBtn">YES 💕</button>
        <button id="noBtn">NO 🙈</button>
    </div>
</div>

<div id="celebrationScreen" class="screen hidden">
    <h1>🎉 SHE SAID YES! 🎉</h1>
    <p>
        You've officially made me the happiest person alive ❤️<br><br>
        I can't wait to spend an amazing day with you 🥰
    </p>

    <h2>🌹 Date Confirmed 🌹</h2>
</div>

<script>
const noBtn = document.getElementById("noBtn");

function moveButton(){
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseenter", moveButton);

document.getElementById("yesBtn").addEventListener("click", () => {

    document.getElementById("questionScreen").classList.add("hidden");
    document.getElementById("celebrationScreen").classList.remove("hidden");

    for(let i=0;i<100;i++){
        const confetti = document.createElement("div");
        confetti.className = "confetti";

        confetti.style.left = Math.random()*100 + "vw";
        confetti.style.top = "-20px";

        confetti.style.background =
            `hsl(${Math.random()*360},100%,50%)`;

        confetti.style.animationDuration =
            (Math.random()*3+2) + "s";

        document.body.appendChild(confetti);
    }

    setInterval(() => {
        const heart = document.createElement("div");

        heart.className = "heart";
        heart.innerHTML = ["❤️","💕","💖","💘","🥰"][Math.floor(Math.random()*5)];

        heart.style.left = Math.random()*100 + "vw";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(),6000);
    },300);
});
</script>

</body>
</html>
```
