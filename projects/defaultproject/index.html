<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Go Calc</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .calculator { width: 100%; max-width: 400px; height: 100vh; background: #000; display: flex; flex-direction: column; padding: 20px; }
        .display-screen { width: 100%; height: 150px; background: transparent; border: none; color: #fff; text-align: right; font-size: 3rem; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; flex-grow: 1; }
        button { border: none; border-radius: 50%; font-size: 1.8rem; color: white; background-color: #333; cursor: pointer; aspect-ratio: 1; }
        button:active { opacity: 0.7; }
        .operator { background-color: #f1a33c; }
        .utility { background-color: #a5a5a5; color: black; }
    </style>
</head>
<body>
    <form method="POST" action="/" class="calculator">
        <input type="text" name="display" value="{{.Display}}" class="display-screen" readonly>
        <div class="grid">
            <button type="submit" name="action" value="C" class="utility">C</button>
            <button type="submit" name="action" value="÷" class="operator">÷</button>
            <!-- ... rest of buttons ... -->
            <button type="submit" name="action" value="=" class="operator">=</button>
        </div>
    </form>
</body>
</html>
