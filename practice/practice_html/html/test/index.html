<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Special Question 💌</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #e8587a;
      --blush: #fde8ef; 
      --deep: #2b1a22;
      --gold: #d4a04c;
      --cream: #fff8f9;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── floating hearts bg ── */
    .hearts-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .heart {
      position: absolute;
      bottom: -40px;
      font-size: 1.4rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg); opacity: 0.7; }
      100% { transform: translateY(-110vh) rotate(10deg); opacity: 0; }
    }

    /* ── card ── */
    .card {
      position: relative; z-index: 1;
      background: #fff;
      border: 1.5px solid #f0c4d4;
      border-radius: 24px;
      padding: 52px 56px 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 48px rgba(232, 88, 122, 0.12);
    }

    .emoji-hero { font-size: 3.8rem; line-height: 1; margin-bottom: 20px; }

    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.72rem;
      color: var(--rose);
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--deep);
      line-height: 1.25;
      margin-bottom: 14px;
    }

    h1 em {
      font-style: italic;
      color: var(--rose);
    }

    p {
      color: #7a5565;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* ── buttons ── */
    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-yes {
      background: var(--rose);
      color: #fff;
      box-shadow: 0 4px 20px rgba(232, 88, 122, 0.38);
    }
    .btn-yes:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 28px rgba(232, 88, 122, 0.48);
    }
    .btn-yes:active { transform: scale(0.97); }

    .btn-no {
      background: var(--blush);
      color: var(--rose);
      position: fixed; /* use fixed so it can roam the whole viewport */
      transition: none;
      white-space: nowrap;
    }

    /* ── page 2 (cheers) ── */
    #page2 {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(135deg, #e8587a 0%, #d4a04c 100%);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 40px;
      animation: fadeIn 0.6s ease;
    }
    #page2.show { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    #page2 .big-emoji { font-size: 5rem; margin-bottom: 24px; animation: pop 0.5s 0.4s both; }
    @keyframes pop {
      0%   { transform: scale(0); }
      70%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    #page2 h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      color: #fff;
      margin-bottom: 14px;
    }

    #page2 p {
      color: rgba(255,255,255,0.88);
      font-size: 1.1rem;
      max-width: 340px;
      margin-bottom: 0;
    }

    /* confetti pieces */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 2px;
      top: -20px;
      animation: confettiFall linear forwards;
      z-index: 200;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- floating hearts -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- PAGE 1 -->
<div class="card" id="page1">
  <div class="emoji-hero">💌</div>
  <div class="eyebrow">a very important question</div>
  <h1>Will you go on a<br><em>date with me?</em></h1>
  <p>I promise good vibes, great food,<br>and even better company. 🌹</p>
  <div class="btn-group">
    <button class="btn btn-yes" onclick="sayYes()">Yes, absolutely! 🥂</button>
    <button class="btn btn-no" id="noBtn">No thanks 🙅‍♀️</button>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2">
  <div class="big-emoji">🥂</div>
  <h2>She said YES! 🎉</h2>
  <p>Get ready for the best date ever.<br>I can't wait to celebrate with you! 💕</p>
</div>

<script>
  /* ── floating hearts ── */
  const hBg = document.getElementById('heartsBg');
  const emojis = ['💕','❤️','🌹','💖','✨','💗','🌸'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('span');
    h.className = 'heart';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
    const dur = 6 + Math.random() * 8;
    h.style.animationDuration = dur + 's';
    h.style.animationDelay = -(Math.random() * dur) + 's';
    hBg.appendChild(h);
  }

  /* ── dodgy No button ── */
  const noBtn = document.getElementById('noBtn');
  let noBtnW = 0, noBtnH = 0;

  // initial position: right of the Yes button
  function initNoBtn() {
    const card = document.querySelector('.card');
    const rect = card.getBoundingClientRect();
    noBtnW = noBtn.offsetWidth;
    noBtnH = noBtn.offsetHeight;
    noBtn.style.left = (rect.right - noBtnW - 24) + 'px';
    noBtn.style.top  = (rect.bottom - noBtnH - 48) + 'px';
  }
  window.addEventListener('load', initNoBtn);
  window.addEventListener('resize', initNoBtn);

  function runAway(e) {
    const mx = e.clientX !== undefined ? e.clientX : e.touches?.[0]?.clientX ?? 0;
    const my = e.clientY !== undefined ? e.clientY : e.touches?.[0]?.clientY ?? 0;

    const bx = parseFloat(noBtn.style.left) + noBtnW / 2;
    const by = parseFloat(noBtn.style.top)  + noBtnH / 2;

    const dx = bx - mx;
    const dy = by - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const flee = 160 + Math.random() * 80;

    let nx = bx + (dx / dist) * flee - noBtnW / 2;
    let ny = by + (dy / dist) * flee - noBtnH / 2;

    // keep within viewport
    nx = Math.max(0, Math.min(window.innerWidth  - noBtnW,  nx));
    ny = Math.max(0, Math.min(window.innerHeight - noBtnH, ny));

    noBtn.style.left = nx + 'px';
    noBtn.style.top  = ny + 'px';
  }

  noBtn.addEventListener('mouseover', runAway);
  noBtn.addEventListener('touchstart', runAway, { passive: true });

  /* ── yes clicked ── */
  function sayYes() {
    document.getElementById('page1').style.display = 'none';
    const p2 = document.getElementById('page2');
    p2.classList.add('show');
    launchConfetti();
  }

  /* ── confetti ── */
  function launchConfetti() {
    const colors = ['#fff','#fde8ef','#d4a04c','#ffcce0','#ffe082','#f8bbd0'];
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left  = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width  = (6 + Math.random() * 8) + 'px';
      c.style.height = (6 + Math.random() * 8) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      const dur = 2.5 + Math.random() * 2.5;
      c.style.animationDuration = dur + 's';
      c.style.animationDelay = (Math.random() * 1.2) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), (dur + 1.5) * 1000);
    }
  }
</script>
</body>
</html>
