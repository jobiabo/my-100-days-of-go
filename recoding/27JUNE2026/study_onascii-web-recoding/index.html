<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ascii-Art-Generator</h1>
    <form action="/ascii" method="post">
        <label for="text" id="text">Enter text:</label><br>
        <textarea name="text" id="text" cols="18" rows="2"></textarea>

        <br>
        <input type="radio" name="banner" id="banners" value="standard">Standard
        <input type="radio" name="banner" id="banners" value="shadow">Shadow
        <input type="radio" name="banner" id="banners" value="thinkertoy">Thinkertoy
        <br>
        <button type="submit">Generate</button>


    </form>

    <pre>{{.Result}}</pre>
    
</body>
</html>
