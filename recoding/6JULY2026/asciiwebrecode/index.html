<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII-ART-WEB</title>
</head>
<body>
    <form action="/ascii" method="post">
        <h1>ASCII-ART-WEB GENERATOR</h1>
        <label for="text">Enter text</label>
        <br>
        <textarea name="text" id="text" cols="19" rows="2" required></textarea>
        <br>
        <input type="radio" name="banner" value="standard"> Standard
        <input type="radio" name="banner" value="shadow"> Shadow
        <input type="radio" name="banner" value="thinkertoy"> Thinkertoy
        <br>
        <button type="submit">Generate</button>


    </form>

        {{if .Result}}
        <pre>{{.Result}}</pre>
        <a href="/ascii-switch?text={{.Text}}&banner=standard">standard</a>
        <a href="/ascii-switch?text={{.Text}}&banner=shadow">shadow</a>
        <a href="/ascii-switch?text={{.Text}}&banner=thinkertoy">thinkertoy</a>
        {{end}}
    
</body>
</html>
